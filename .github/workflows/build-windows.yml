name: Build Windows EXE

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Instalar dependencias
        run: pip install -r requirements.txt

      - name: Construir ejecutable
        run: pyinstaller ConsolidadorCCTT.spec

      - name: Empaquetar carpeta como ZIP
        run: Compress-Archive -Path dist\ConsolidadorCCTT -DestinationPath dist\ConsolidadorCCTT-Windows.zip
        shell: pwsh

      - name: Subir ejecutable como artefacto
        uses: actions/upload-artifact@v4
        with:
          name: ConsolidadorCCTT-Windows
          path: dist/ConsolidadorCCTT-Windows.zip
          retention-days: 30
